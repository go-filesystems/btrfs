name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Native runners: full build + vet + test (race + coverage) for the two
  # architectures GitHub provides natively. Coverage is gated below.
  native:
    name: native ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout btrfs
        uses: actions/checkout@v4
        with:
          path: btrfs

      # go.mod carries `replace github.com/go-filesystems/interface =>
      # ../interface`, so the sibling module must sit next to this one.
      - name: Checkout interface (sibling replace target)
        uses: actions/checkout@v4
        with:
          repository: go-filesystems/interface
          path: interface

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
          cache-dependency-path: btrfs/go.mod

      - name: Build
        working-directory: btrfs
        env:
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Vet
        working-directory: btrfs
        env:
          CGO_ENABLED: "0"
        run: go vet ./...

      # Full (non-short) test pass with the race detector. The btrfs reader
      # has slow stress/resize tests gated behind testing.Short(); run them in
      # full here, so raise the timeout accordingly.
      - name: Test (race + coverage)
        working-directory: btrfs
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 -covermode=atomic -coverprofile=cover.out -timeout=30m ./...

      - name: Gate coverage
        working-directory: btrfs
        run: |
          set -euo pipefail
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 90.0) ? 0 : 1 }' \
            || { echo "coverage ${pct}% below gate 90.0%"; exit 1; }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.arch }}
          path: btrfs/cover.out
          if-no-files-found: ignore

  # Emulated runners: cross-compile a static (CGO_ENABLED=0) test binary per
  # package and run it under QEMU for each non-native 64-bit arch. Tests run
  # with -test.short because the slow stress/resize paths are impractical
  # under emulation; the short paths still exercise the full read/write
  # decoders.
  #
  # s390x is big-endian, which exercises the Btrfs byte-order handling: the
  # on-disk superblock / node / item decoders all use explicit
  # binary.LittleEndian, so reads stay host-endianness-independent.
  emulated:
    name: emulated ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu: rv64,v=true,vlen=128
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu: la464
          - arch: ppc64le
            image: debian:trixie
            qemu: power9
          - arch: s390x
            image: debian:trixie
            qemu: qemu
    steps:
      - name: Checkout btrfs
        uses: actions/checkout@v4
        with:
          path: btrfs

      - name: Checkout interface (sibling replace target)
        uses: actions/checkout@v4
        with:
          repository: go-filesystems/interface
          path: interface

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
          cache-dependency-path: btrfs/go.mod

      - name: Register QEMU binfmt handlers
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      # Build each package's test binary inside that package's own source
      # directory. Several tests read fixtures from a relative `testdata/`
      # path (e.g. testdata/raid/*.tar.zst), so the binary must run with its
      # package directory as the working directory; co-locating the binary
      # keeps that path resolvable when the dir is mounted into the container.
      - name: Cross-compile per-package test binaries
        working-directory: btrfs
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          : > /tmp/test-dirs.txt
          while IFS=$'\t' read -r pkg dir; do
            name=$(echo "$pkg" | tr '/' '_')
            # Skip packages without test files (go test -c emits no binary).
            go test -c -cover -o "${dir}/${name}.test" "$pkg"
            if [ -f "${dir}/${name}.test" ]; then
              echo "built ${name}.test in ${dir}"
              printf '%s\t%s\n' "${dir}" "${name}.test" >> /tmp/test-dirs.txt
            fi
          done < <(go list -f '{{.ImportPath}}{{"\t"}}{{.Dir}}' ./...)
          cat /tmp/test-dirs.txt

      - name: Run test binaries under QEMU (${{ matrix.arch }})
        env:
          QEMU_CPU: ${{ matrix.qemu }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/test-dirs.txt ]; then
            echo "no test binaries to run"; exit 0
          fi
          rc=0
          while IFS=$'\t' read -r dir bin; do
            echo "::group::${bin}"
            # Run with the package source dir mounted as the workdir so the
            # tests' relative testdata/ fixtures resolve. -test.short skips the
            # slow stress/resize paths that are impractical under emulation.
            if ! docker run --rm \
              --platform linux/${{ matrix.arch }} \
              -e QEMU_CPU="${QEMU_CPU}" \
              -v "${dir}":/src -w /src \
              ${{ matrix.image }} \
              "./${bin}" -test.short -test.v; then
              rc=1
            fi
            echo "::endgroup::"
          done < /tmp/test-dirs.txt
          exit $rc
